services:
  db:
    build: .
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fuzzyregion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fuzzyregion"]
      interval: 5s
      timeout: 3s
      retries: 10
